name: ClanPlugin
main: ClanPlugin\Main
version: 1.0.0
api: 5.0.0
author: SeuNome
description: "Sistema completo de Clãs com UI e leaderboard"

permissions:
  clanplugin.use:
    description: "Permite usar /clan"
    default: true
  clanplugin.admin:
    description: "Permite administrar clãs"
    default: op
  clanplugin.leaderboard.create:
    description: "Permite criar leaderboard flutuante"
    default: op

commands:
  clan:
    description: "Sistema de Clãs"
    usage: "/clan"
    aliases: ["c"]
    permission: clanplugin.use
  lftops:
    description: "Receber item de leaderboard flutuante"
    usage: "/lftops"
    permission: clanplugin.leaderboard.create